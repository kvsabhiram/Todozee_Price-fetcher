name: deploy

# Push-to-deploy. Dormant until the AWS_DEPLOY_ROLE_ARN repo secret is set
# (Settings -> Secrets and variables -> Actions). Until then it no-ops with a
# clear message instead of failing.
on:
  push:
    branches: [main]
    paths-ignore:
      - "terraform/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: ap-south-1
  INSTANCE_NAME: todozee-price-fetcher

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — secret present?
        id: guard
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "AWS_DEPLOY_ROLE_ARN not set — skipping deploy. Add the secret to enable CI/CD."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.guard.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM RunCommand
        if: steps.guard.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${INSTANCE_NAME}" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          if [ -z "$INSTANCE_ID" ]; then echo "No running instance found"; exit 1; fi
          echo "Deploying ${GITHUB_SHA} to $INSTANCE_ID"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy ${GITHUB_SHA}" \
            --parameters "commands=[\"sudo /usr/local/bin/deploy-app.sh ${GITHUB_SHA}\"]" \
            --query 'Command.CommandId' --output text)

          echo "Command: $CMD_ID — waiting…"
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text)
          echo "----- stdout -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text
          echo "----- stderr -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text
          echo "Status: $STATUS"
          [ "$STATUS" = "Success" ]
