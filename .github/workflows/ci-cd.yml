name: CI/CD

# CI runs on every push and PR. CD (deploy) runs only on main, only after CI
# passes, and only when the AWS_DEPLOY_ROLE_ARN secret is set.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # OIDC for the deploy job
  contents: read

env:
  AWS_REGION: ap-south-1
  INSTANCE_NAME: todozee-price-fetcher

jobs:
  # ── CI: lint, syntax, and an API smoke test ────────────────────────────────
  app-ci:
    name: App · lint & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Syntax check (py_compile)
        run: python -m py_compile safe_price_fetcher.py

      - name: Lint (real errors only)
        run: ruff check --select E9,F63,F7,F82 .

      - name: Smoke test — app imports and /api/health responds
        run: |
          python - <<'PY'
          import safe_price_fetcher as m
          client = m.app.test_client()
          r = client.get("/api/health")
          assert r.status_code == 200, f"health status {r.status_code}"
          body = r.get_json()
          assert body.get("status") == "ok", body
          # 404 handler returns JSON, not an HTML stack trace
          nf = client.get("/does-not-exist")
          assert nf.status_code == 404 and nf.get_json().get("status") == "error"
          print("smoke ok:", body)
          PY

  # ── CI: validate the Terraform ─────────────────────────────────────────────
  terraform-ci:
    name: Terraform · fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"
      - name: Format check
        run: terraform -chdir=terraform fmt -check -recursive
      - name: Init (no backend)
        run: terraform -chdir=terraform init -backend=false
      - name: Validate
        run: terraform -chdir=terraform validate

  # ── CD: deploy to the instance via SSM (gated on CI + main + secret) ────────
  deploy:
    name: Deploy · SSM RunCommand
    needs: [app-ci, terraform-ci]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Guard — secret present?
        id: guard
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "AWS_DEPLOY_ROLE_ARN not set — skipping deploy. Add the secret to enable CD."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.guard.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM RunCommand
        if: steps.guard.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${INSTANCE_NAME}" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          if [ -z "$INSTANCE_ID" ]; then echo "No running instance found"; exit 1; fi
          echo "Deploying ${GITHUB_SHA} to $INSTANCE_ID"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy ${GITHUB_SHA}" \
            --parameters "commands=[\"sudo /usr/local/bin/deploy-app.sh ${GITHUB_SHA}\"]" \
            --query 'Command.CommandId' --output text)

          echo "Command: $CMD_ID — waiting…"
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text)
          echo "----- stdout -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text
          echo "----- stderr -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text
          echo "Status: $STATUS"
          [ "$STATUS" = "Success" ]
